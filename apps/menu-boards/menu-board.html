<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #1a1a1a;
      color: #ffffff;
      font-family: 'Open Sans', Arial, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .menu-board {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 40px 60px;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Decorative brush strokes */
    .brush-red {
      position: absolute;
      top: -30px; left: -40px;
      width: 260px; height: 180px;
      background: var(--accent-red, #e8222b);
      border-radius: 0 60% 70% 0;
      transform: rotate(-8deg);
      opacity: 0.95; z-index: 0;
    }
    .brush-red::after {
      content: ''; position: absolute;
      top: 30px; left: 60px;
      width: 180px; height: 80px;
      background: var(--accent-red, #e8222b);
      border-radius: 40%; transform: rotate(12deg);
    }
    .brush-yellow {
      position: absolute;
      bottom: -30px; right: -40px;
      width: 280px; height: 160px;
      background: var(--accent-gold, #e8a020);
      border-radius: 60% 0 0 40%;
      transform: rotate(5deg);
      opacity: 0.95; z-index: 0;
    }
    .brush-yellow::after {
      content: ''; position: absolute;
      bottom: 20px; right: 40px;
      width: 160px; height: 70px;
      background: var(--accent-gold, #e8a020);
      border-radius: 40%; transform: rotate(-8deg);
    }

    /* Logo */
    .logo-container {
      position: relative; z-index: 1;
      text-align: center;
      padding: 40px 0 20px;
    }
    .logo-container img {
      max-width: 380px; width: 100%; height: auto;
    }

    /* Menu items */
    .menu-items {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      gap: 30px; padding-top: 20px;
    }

    .menu-item {
      display: flex; align-items: center;
      gap: 30px; padding: 20px 0;
    }
    .menu-item.reverse { flex-direction: row-reverse; }

    .menu-item-image {
      flex: 0 0 320px; width: 320px; height: 340px;
      border-radius: 16px; background: #2a2a2a;
      overflow: hidden; display: flex;
      align-items: center; justify-content: center;
    }
    .menu-item-image img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .menu-item-info { flex: 1; }

    .menu-item-badge {
      display: inline-block;
      background: var(--accent-gold, #e8a020);
      color: #1a1a1a;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 4px;
      margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 1px;
      transform: rotate(-5deg);
    }

    .menu-item-name {
      font-family: 'Anton', sans-serif;
      font-size: 36px; text-transform: uppercase;
      letter-spacing: 2px; line-height: 1.1;
      margin-bottom: 12px;
    }

    .menu-item-desc {
      font-size: 18px; color: #cccccc;
      line-height: 1.5; margin-bottom: 16px;
    }

    .menu-item-price {
      font-family: 'Anton', sans-serif;
      font-size: 52px;
      color: var(--accent-gold, #e8a020);
      letter-spacing: 1px;
    }

    /* Loading state */
    .loading {
      text-align: center; padding: 60px 0;
      font-size: 18px; color: #666;
    }

    /* Last updated */
    .last-updated {
      position: fixed; bottom: 8px; right: 12px;
      font-size: 11px; color: #444; z-index: 10;
    }

    /* Responsive for TV screens */
    @media (min-width: 1920px) {
      .menu-board { max-width: 1600px; padding: 0 80px 80px; }
      .logo-container img { max-width: 560px; }
      .menu-item-name { font-size: 52px; }
      .menu-item-desc { font-size: 24px; }
      .menu-item-price { font-size: 72px; }
      .menu-item-image { flex: 0 0 480px; width: 480px; height: 500px; }
      .menu-items { gap: 50px; }
    }

    /* Print styles */
    @media print {
      body { background: #1a1a1a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .menu-board { max-width: 100%; padding: 20px; }
      .last-updated { display: none; }
    }
  </style>
</head>
<body>
  <div class="menu-board">
    <div class="brush-red"></div>
    <div class="brush-yellow"></div>

    <div class="logo-container">
      <img src="images/logo.png" alt="Menu Board" id="logo">
    </div>

    <div class="menu-items" id="menuItems">
      <div class="loading">Loading menu...</div>
    </div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>

  <script>
    // ── Configuration ──────────────────────────────────────────
    // Usage: menu-board.html?tenant=juanbertos&category=California+Burritos
    //   tenant   = tenant subdomain (required for cross-origin, optional if same-origin)
    //   category = filter to a specific category name (optional, shows all if omitted)
    //   refresh  = auto-refresh interval in seconds (default: 300 = 5 min)

    const params = new URLSearchParams(window.location.search);
    const TENANT_ID = params.get('tenant') || 'juanbertos';
    const CATEGORY_FILTER = params.get('category') || null;
    const REFRESH_INTERVAL = parseInt(params.get('refresh') || '300', 10) * 1000;
    const API_BASE = params.get('api') || 'https://pos.desktop.kitchen';

    // Image mapping — tenants can configure these per item name
    // Falls back to images/{slug}.png in the local images/ folder
    const IMAGE_MAP = {};

    function slugify(name) {
      return name.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-|-$)/g, '');
    }

    function getImageUrl(item) {
      if (IMAGE_MAP[item.name]) return IMAGE_MAP[item.name];
      if (item.image_url) return item.image_url;
      return `images/${slugify(item.name)}.png`;
    }

    function formatPrice(price) {
      const num = parseFloat(price);
      return `$${Number.isInteger(num) ? num : num.toFixed(0)}`;
    }

    async function fetchMenu() {
      try {
        const headers = { 'X-Tenant-ID': TENANT_ID };
        const url = CATEGORY_FILTER
          ? `${API_BASE}/api/menu/items`
          : `${API_BASE}/api/menu/items`;

        const [itemsRes, catsRes] = await Promise.all([
          fetch(`${API_BASE}/api/menu/items`, { headers }),
          fetch(`${API_BASE}/api/menu/categories`, { headers })
        ]);

        if (!itemsRes.ok) throw new Error(`API error: ${itemsRes.status}`);

        const items = await itemsRes.json();
        const categories = await catsRes.json();

        // Build category lookup
        const catMap = {};
        categories.forEach(c => { catMap[c.id] = c.name; });

        // Filter by category name if specified
        let filtered = items.filter(i => i.active);
        if (CATEGORY_FILTER) {
          const matchingCatIds = categories
            .filter(c => c.name.toLowerCase() === CATEGORY_FILTER.toLowerCase())
            .map(c => c.id);
          filtered = filtered.filter(i => matchingCatIds.includes(i.category_id));
        }

        renderMenu(filtered);
        updateTimestamp();
      } catch (err) {
        console.error('Failed to fetch menu:', err);
        document.getElementById('menuItems').innerHTML =
          `<div class="loading">Unable to load menu. Retrying...</div>`;
      }
    }

    function renderMenu(items) {
      const container = document.getElementById('menuItems');

      if (items.length === 0) {
        container.innerHTML = '<div class="loading">No menu items found.</div>';
        return;
      }

      container.innerHTML = items.map((item, index) => {
        const isReverse = index % 2 === 1;
        const imgUrl = getImageUrl(item);

        return `
          <div class="menu-item ${isReverse ? 'reverse' : ''}">
            <div class="menu-item-image">
              <img src="${imgUrl}" alt="${item.name}"
                   onerror="this.parentElement.style.background='#2a2a2a'; this.style.display='none';">
            </div>
            <div class="menu-item-info">
              <h2 class="menu-item-name">${item.name}</h2>
              ${item.description ? `<p class="menu-item-desc">${item.description}</p>` : ''}
              <div class="menu-item-price">${formatPrice(item.price)}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateTimestamp() {
      const now = new Date();
      document.getElementById('lastUpdated').textContent =
        `Updated: ${now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' })}`;
    }

    // ── Init ────────────────────────────────────────────────────
    fetchMenu();
    setInterval(fetchMenu, REFRESH_INTERVAL);
  </script>
</body>
</html>
