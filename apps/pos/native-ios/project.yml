name: JuanbertosPOS
options:
  bundleIdPrefix: com.juanbertos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"
    ENABLE_PREVIEWS: "YES"
    SWIFT_STRICT_CONCURRENCY: "complete"

targets:
  JuanbertosPOS:
    type: application
    platform: iOS
    sources:
      - path: JuanbertosPOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.juanbertos.pos
        INFOPLIST_KEY_CFBundleDisplayName: "Juanberto's POS"
        PRODUCT_NAME: "JuanbertosPOS"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: "Automatic"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Connect to POS server on local network"
        INFOPLIST_KEY_NSBonjourServices: "_http._tcp"
    info:
      path: JuanbertosPOS/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
        UIRequiresFullScreen: true
