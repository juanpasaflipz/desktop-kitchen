name: DesktopKitchenPOS
options:
  bundleIdPrefix: com.desktopkitchen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"
    ENABLE_PREVIEWS: "YES"
    SWIFT_STRICT_CONCURRENCY: "complete"

targets:
  DesktopKitchenPOS:
    type: application
    platform: iOS
    sources:
      - path: DesktopKitchenPOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.desktopkitchen.pos
        INFOPLIST_KEY_CFBundleDisplayName: "Desktop Kitchen POS"
        CURRENT_PROJECT_VERSION: "2"
        MARKETING_VERSION: "1.0"
        PRODUCT_NAME: "DesktopKitchenPOS"
        DEVELOPMENT_TEAM: "U76V8DL3W4"
        CODE_SIGN_STYLE: "Automatic"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Connect to POS server on local network"
        INFOPLIST_KEY_NSBonjourServices: "_http._tcp"
    info:
      path: DesktopKitchenPOS/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "Connect to POS server on local network"
        NSBonjourServices:
          - "_http._tcp"
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
